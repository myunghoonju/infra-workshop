server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://platform-db.ccjb1xspfkcd.ap-northeast-2.rds.amazonaws.com:3306/analysis_db?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false&useUnicode=yes&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    enabled: true
    baseline-version: 1
    baseline-on-migrate: true

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    orig:
      hibernate:
        type:
          descriptor:
            sql:
              BasicBinder: DEBUG

auth:
  secret-key: secret-key
